spring.application.name=Tea & Coffee Project

# Server Configuration
server.port=8081

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fandb_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# Logging
logging.level.org.hibernate.tool.schema.internal.ExceptionHandlerLoggedImpl=ERROR

# View Configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# File Upload Configuration
file.upload-dir=D:/nam3/FANDB_uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Mail Configuration (Gmail SMTP)

spring.mail.host=smtp.gmail.com

spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:buiquochung0942@gmail.com}
spring.mail.password=${MAIL_PASSWORD:jyrvtidciiavnjry}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OAuth2 Configuration
# Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret}
spring.security.oauth2.client.registration.google.scope=profile,email
