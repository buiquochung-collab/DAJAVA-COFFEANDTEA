<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Quên mật khẩu | Tea & Coffee</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-success">QUÊN MẬT KHẨU?</h3>
                            <p class="text-muted small">Nhập Tên đăng nhập hoặc Email của bạn để nhận mã xác thực OTP.</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger rounded-pill py-2 small text-center" th:text="${error}"></div>

                        <form th:action="@{/auth/forgot-password}" method="post">
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted">NHẬP TÊN ĐĂNG NHẬP / EMAIL</label>
                                <input type="text" name="identifier" class="form-control rounded-pill border-success-subtle p-3 shadow-none" required>
                            </div>

                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted d-block mb-3">NHẬN MÃ OTP QUA:</label>
                                <div class="d-flex gap-4 justify-content-center">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="channel" id="chanEmail" value="EMAIL" checked>
                                        <label class="form-check-label small fw-bold" for="chanEmail">
                                            <i class="fas fa-envelope me-1 text-success"></i> EMAIL
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="channel" id="chanPhone" value="PHONE">
                                        <label class="form-check-label small fw-bold" for="chanPhone">
                                            <i class="fas fa-sms me-1 text-primary"></i> SMS (SĐT)
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid mt-5">
                                <button type="submit" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm">GỬI MÃ XÁC THỰC</button>
                            </div>
                            <div class="text-center mt-4">
                                <a th:href="@{/login}" class="text-success text-decoration-none small fw-bold"><i class="fas fa-arrow-left me-2"></i>Quay lại Đăng nhập</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
