<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Trang chủ</title>
    <!-- Thêm font chữ đẹp -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; }
        .section-title { letter-spacing: 2px; color: var(--pl-green); }
        .product-card { 
            border: none; 
            transition: all 0.3s; 
            background: #fff; 
            border-radius: 15px !important;
        }
        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; 
        }
        .price-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .size-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            background: #f8f9fa;
        }
        .size-btn.active {
            background: var(--pl-green);
            color: white;
            border-color: var(--pl-green);
        }
    </style>
</head>
<body>
<div layout:fragment="content">
    <!-- Banner Carousel - 4 Banners -->
    <div class="container my-4">
        <div id="homeCarousel" class="carousel slide overflow-hidden shadow-sm" data-bs-ride="carousel" style="border-radius: 20px;">
            <div class="carousel-inner">
                <div class="carousel-item active" data-bs-interval="3000">
                    <img src="/uploads/banners/banner1.png" class="d-block w-100 banner-img" alt="Banner 1">
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="/uploads/banners/banner2.png" class="d-block w-100 banner-img" alt="Banner 2">
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="/uploads/banners/banner3.png" class="d-block w-100 banner-img" alt="Banner 3">
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="/uploads/banners/banner4.png" class="d-block w-100 banner-img" alt="Banner 4">
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#homeCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#homeCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
        </div>
    </div>

    <!-- Best Sellers Section ONLY -->
    <div class="container py-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold section-title text-uppercase">Best Sellers</h2>
            <div class="mx-auto mt-2" style="width: 80px; height: 4px; background-color: var(--pl-green); border-radius: 2px;"></div>
            <p class="text-muted mt-3">Những hương vị được yêu thích nhất trong tháng qua</p>
        </div>

        <div class="row g-4 justify-content-center">
            <!-- Nếu không có bestseller -->
            <div th:if="${bestSellers == null or bestSellers.empty}" class="col-12 text-center py-5">
                <div class="opacity-50">
                    <i class="fas fa-mug-hot fa-3x mb-3"></i>
                    <p>Hiện chưa có sản phẩm nào đạt danh hiệu Bestseller tháng này.</p>
                </div>
            </div>

            <!-- Danh sách bestseller -->
            <div class="col-6 col-md-4 col-lg-3" th:each="product : ${bestSellers}">
                <div class="product-card text-center h-100 d-flex flex-column p-4 shadow-sm">
                    <a th:href="@{'/product/' + ${product.id}}" class="text-decoration-none flex-grow-1">
                        <img th:src="${product.imageUrl}" class="product-img mb-3 w-100" alt="Product Image" style="max-height: 200px; object-fit: contain;">
                        <h6 class="card-title text-dark fw-bold mb-3" th:text="${product.name}">Tên sản phẩm</h6>
                    </a>

                    <!-- Size & Price Preview -->
                    <div class="price-container">
                        <div class="price-toggle">
                            <span class="size-btn active" data-size="M"
                                  th:data-price="${#numbers.formatDecimal(product.priceM != null ? product.priceM : product.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"
                                  onclick="updatePrice(this)">M</span>
                            <span class="size-btn" th:if="${product.priceL != null}" data-size="L"
                                  th:data-price="${#numbers.formatDecimal(product.priceL, 0, 'COMMA', 0, 'POINT') + 'đ'}"
                                  onclick="updatePrice(this)">L</span>
                        </div>
                        <p class="price text-success fw-bold h5 mb-3" th:text="${#numbers.formatDecimal(product.priceM != null ? product.priceM : product.price, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</p>
                    </div>

                    <form th:action="@{/cart/add}" method="post">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <input type="hidden" name="size" value="M" class="selected-size">
                        <button type="submit" class="btn btn-success w-100 rounded-pill fw-bold py-2 shadow-sm">
                            <i class="fas fa-cart-plus me-2"></i> ĐẶT HÀNG
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>



    <!-- News & Promotions Section -->
    <div class="container py-5 border-top">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <h2 class="fw-bold m-0 section-title text-uppercase">Tin tức và Khuyến mãi</h2>
            <a href="/promotions" class="text-success text-decoration-none fw-bold small">XEM THÊM <i class="fas fa-chevron-right ms-1"></i></a>
        </div>
        <div class="row g-4">
            <div class="col-md-6" th:each="news : ${newsList}">
                <div class="card border-0 shadow-sm overflow-hidden h-100 rounded-4 news-card">
                    <img th:src="${news.imageUrl}" class="card-img-top" alt="News Image" style="height: 250px; object-fit: cover;">
                    <div class="card-body p-4">
                        <h5 class="card-title text-dark fw-bold mb-3" th:text="${news.title}">Tiêu đề tin tức</h5>
                        <p class="card-text text-muted small" th:text="${news.content}">Nội dung tóm tắt...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .news-card { transition: 0.3s; }
        .news-card:hover { transform: scale(1.02); }
    </style>

    <script>
        function updatePrice(element) {
            const card = element.closest('.product-card');
            const container = element.closest('.price-container');
            const priceText = element.getAttribute('data-price');
            const size = element.getAttribute('data-size');
            
            // Update active state
            container.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // Update price display
            container.querySelector('.price').innerText = priceText;
            
            // Update hidden input in form
            card.querySelector('.selected-size').value = size;
        }
    </script>
</div>
</body>
</html>
