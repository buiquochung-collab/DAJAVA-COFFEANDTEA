<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Quản lý thành viên | Tea & Coffee Admin</title>
</head>
<body>
<div layout:fragment="admin-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Quản lý thành viên</h2>
        <div class="text-muted small">Tổng số: <span class="fw-bold text-dark" th:text="${#lists.size(users)}">0</span> thành viên</div>
    </div>

    <!-- Search Box -->
    <div class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-body p-4">
            <form th:action="@{/admin/users}" method="get" class="row g-3">
                <div class="col-md-10">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 rounded-start-pill px-3">
                            <i class="fas fa-search text-muted"></i>
                        </span>
                        <input type="text" name="query" th:value="${query}" class="form-control border-start-0 rounded-end-pill py-2" 
                               placeholder="Tìm kiếm theo Tên, Số điện thoại, Email hoặc Username...">
                    </div>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold shadow-sm">TÌM KIẾM</button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-4 border-0 shadow-sm mb-4">
        <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                    <tr>
                        <th class="ps-4">Thành viên</th>
                        <th>Thông tin liên hệ</th>
                        <th>Hạng thẻ</th>
                        <th>Điểm tích lũy</th>
                        <th>Trạng thái</th>
                        <th class="text-end pe-4">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td class="ps-4">
                            <div class="d-flex align-items-center">
                                <div class="avatar-circle me-3" 
                                     th:style="'background: ' + (${user.role.name() == 'ADMIN' ? '#e74a3b' : '#006a31'}) + '; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;'"
                                     th:text="${user.username != null and !user.username.isEmpty() ? user.username.substring(0, 1).toUpperCase() : 'U'}">U</div>
                                <div>
                                    <div class="fw-bold" th:text="${user.fullName ?: user.username}">Full Name</div>
                                    <div class="text-muted small" th:text="'@' + ${user.username}">@username</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <div class="small"><i class="fas fa-envelope me-1 opacity-50"></i> <span th:text="${user.email}">email@example.com</span></div>
                            <div class="small mt-1"><i class="fas fa-phone me-1 opacity-50"></i> <span th:text="${user.phone ?: '-'}">090xxxxxxx</span></div>
                        </td>
                        <td>
                            <span class="badge rounded-pill" 
                                  th:classappend="${user.membershipRank == 'PLATINUM' ? 'bg-info text-dark' : (user.membershipRank == 'GOLD' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                  th:text="${user.membershipRank}">SILVER</span>
                        </td>
                        <td>
                            <div class="fw-bold text-success" th:text="${user.points + 'đ'}">0đ</div>
                        </td>
                        <td>
                            <span class="badge rounded-pill" 
                                  th:classappend="${user.status == 'ACTIVE' ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}"
                                  th:text="${user.status == 'ACTIVE' ? 'Đang hoạt động' : 'Đang bị khóa'}">ACTIVE</span>
                        </td>
                        <td class="text-end pe-4">
                            <form th:action="@{'/admin/users/toggle-status/' + ${user.id}}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm btn-outline-dark rounded-circle" 
                                        th:title="${user.status == 'LOCKED' ? 'Mở khóa' : 'Khóa tài khoản'}">
                                    <i th:class="${user.status == 'LOCKED' ? 'fas fa-unlock' : 'fas fa-lock'}"></i>
                                </button>
                            </form>
                            <!-- Nút xem lịch sử điểm (giả lập) -->
                            <button class="btn btn-sm btn-outline-primary rounded-circle ms-1" title="Lịch sử điểm">
                                <i class="fas fa-history"></i>
                            </button>
                        </td>
                    </tr>
                    <tr th:if="${users.isEmpty()}">
                        <td colspan="6" class="text-center py-5 text-muted">
                            <i class="fas fa-user-slash fa-3x mb-3 opacity-10"></i>
                            <p>Không tìm thấy thành viên nào khớp với yêu cầu!</p>
                            <a href="/admin/users" class="btn btn-sm btn-link">Xem tất cả</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
