<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Đặt lại mật khẩu | Tea & Coffee</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h3 class="fw-bold text-success">ĐẶT LẠI MẬT KHẨU</h3>
                            <p class="text-muted small">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger rounded-pill py-2 small text-center" th:text="${error}"></div>

                        <form th:action="@{/auth/reset-password}" method="post">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">Mật khẩu mới</label>
                                <input type="password" name="password" class="form-control rounded-pill border-success-subtle p-3 shadow-none" required minlength="6">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Xác nhận mật khẩu</label>
                                <input type="password" name="confirmPassword" class="form-control rounded-pill border-success-subtle p-3 shadow-none" required minlength="6">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm">XÁC NHẬN ĐỔI MẬT KHẨU</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
