<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Đăng ký thành viên | Tea & Coffee</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <h2 class="fw-bold text-success text-uppercase">Đăng ký thành viên</h2>
                            <p class="text-muted small">Khám phá thế giới Tea & Coffee cùng Tea & Coffee.</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger rounded-pill py-2 small text-center" th:text="${error}"></div>

                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Tên đăng nhập *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0 rounded-start-pill border-success-subtle"><i class="fas fa-user-tag text-success opacity-50"></i></span>
                                        <input type="text" th:field="*{username}" class="form-control border-start-0 rounded-end-pill border-success-subtle p-3 shadow-none" required>
                                    </div>
                                    <div class="text-danger small ms-2 mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold">Mật khẩu *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0 rounded-start-pill border-success-subtle"><i class="fas fa-lock text-success opacity-50"></i></span>
                                        <input type="password" th:field="*{password}" class="form-control border-start-0 rounded-end-pill border-success-subtle p-3 shadow-none" required>
                                    </div>
                                    <div class="text-danger small ms-2 mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label small fw-bold">Địa chỉ Email *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0 rounded-start-pill border-success-subtle"><i class="fas fa-envelope text-success opacity-50"></i></span>
                                        <input type="email" th:field="*{email}" class="form-control border-start-0 rounded-end-pill border-success-subtle p-3 shadow-none" required>
                                    </div>
                                    <div class="text-danger small ms-2 mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                                </div>

                                <div class="col-md-12">
                                    <label class="form-label small fw-bold">Số điện thoại *</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0 rounded-start-pill border-success-subtle"><i class="fas fa-phone text-success opacity-50"></i></span>
                                        <input type="tel" th:field="*{phone}" class="form-control border-start-0 rounded-end-pill border-success-subtle p-3 shadow-none" required>
                                    </div>
                                    <div class="text-danger small ms-2 mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                                </div>
                            </div>

                            <div class="form-check my-4 ms-2">
                                <input class="form-check-input" type="checkbox" id="agree" required checked>
                                <label class="form-check-label small text-muted" for="agree">
                                    Tôi đồng ý với các <a th:href="@{/terms-of-service}" class="text-success fw-bold text-decoration-none">điều khoản sử dụng</a> của Tea & Coffee.
                                </label>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm">ĐĂNG KÝ NGAY</button>
                            </div>
                            
                            <div class="divider d-flex align-items-center my-4">
                                <hr class="flex-grow-1"><span class="mx-3 text-muted small fw-bold">HOẶC</span><hr class="flex-grow-1">
                            </div>

                            <div class="d-grid">
                                <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger rounded-pill py-2 fw-bold small">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" class="me-2"> Tiếp tục với Google
                                </a>
                            </div>

                            <div class="text-center mt-4">
                                <p class="small">Đã có tài khoản? <a th:href="@{/login}" class="text-success text-decoration-none fw-bold">Đăng nhập</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
