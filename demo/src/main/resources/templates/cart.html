<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Giỏ hàng | Tea & Coffee</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <h2 class="mb-5 text-center fw-bold text-success">GIỎ HÀNG CỦA BẠN</h2>
        
        <div th:if="${cartItems.isEmpty()}" class="text-center py-5">
            <i class="fas fa-shopping-basket fa-4x text-muted mb-3"></i>
            <p class="lead">Giỏ hàng của bạn đang trống.</p>
            <a th:href="@{/}" class="btn btn-success btn-lg px-5 rounded-pill">TIẾP TỤC MUA SẮM</a>
        </div>

        <div th:unless="${cartItems.isEmpty()}">
            <div class="row g-4">
                <!-- Left: Product List -->
                <div class="col-lg-8">
                    <div class="card shadow-sm border-0 mb-4 rounded-4 overflow-hidden">
                        <div class="table-responsive">
                            <table class="table align-middle mb-0">
                                <thead class="bg-light">
                                    <tr>
                                        <th class="ps-4 py-3">Sản phẩm</th>
                                        <th>Tùy chỉnh</th>
                                        <th>Số lượng</th>
                                        <th class="pe-4 text-end">Thành tiền</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item, iter : ${cartItems}">
                                        <td class="ps-4 py-4">
                                            <div class="d-flex align-items-center">
                                                <img th:src="${item.imageUrl}" class="rounded-3 me-3" width="70" height="70" style="object-fit: contain; background: #f8f9fa;">
                                                <div>
                                                    <h6 class="mb-1 fw-bold" th:text="${item.productName}"></h6>
                                                    <span class="badge bg-success-subtle text-success rounded-pill" th:text="'Size ' + ${item.size}"></span>
                                                </div>
                                            </div>
                                        </td>
                                        <td>
                                            <div class="small text-muted italic" th:text="${item.note != null and !item.note.isEmpty() ? item.note : 'Không có ghi chú'}">
                                                Ghi chú sản phẩm
                                            </div>
                                        </td>
                                        <td>
                                            <div class="d-flex align-items-center" style="width: 100px;">
                                                <form th:action="@{/cart/update}" method="post">
                                                    <input type="hidden" name="index" th:value="${iter.index}">
                                                    <input type="number" name="quantity" class="form-control form-control-sm text-center border-success" 
                                                           th:value="${item.quantity}" min="1" onchange="this.form.submit()">
                                                </form>
                                            </div>
                                            <a th:href="@{'/cart/remove/' + ${iter.index}}" class="text-danger extra-small mt-1 d-inline-block text-decoration-none">Xóa khỏi giỏ</a>
                                        </td>
                                        <td class="pe-4 text-end fw-bold text-success" th:text="${#numbers.formatDecimal(item.subtotal, 0, 'COMMA', 0, 'POINT') + ' đ'}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Right: Summary -->
                <div class="col-lg-4">
                    <div class="card shadow-sm border-0 rounded-4 p-4 sticky-top" style="top: 2rem;">
                        <h5 class="fw-bold mb-4 border-bottom pb-2">TỔNG ĐƠN HÀNG</h5>
                        
                        <div class="summary-details bg-light p-3 rounded-3 mb-4">
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Tạm tính</span>
                                <span th:text="${#numbers.formatDecimal(subtotal, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">Phí vận chuyển</span>
                                <span class="text-success">Tính khi thanh toán</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span class="text-muted">VAT (10%)</span>
                                <span th:text="${#numbers.formatDecimal(vatAmount, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="fw-bold h5 mb-0">TỔNG CỘNG</span>
                                <span class="fw-bold h4 mb-0 text-success" th:text="${#numbers.formatDecimal(total, 0, 'COMMA', 0, 'POINT') + ' đ'}"></span>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <a th:href="@{/cart/checkout}" class="btn btn-success btn-lg py-3 rounded-pill fw-bold text-uppercase shadow-sm">
                                TIẾN HÀNH ĐẶT HÀNG
                            </a>
                            <a th:href="@{/menu}" class="btn btn-link text-success text-decoration-none small fw-bold mt-2">
                                <i class="fas fa-arrow-left me-2"></i>Tiếp tục mua sắm
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
