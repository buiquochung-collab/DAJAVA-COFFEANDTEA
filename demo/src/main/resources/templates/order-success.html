<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Đặt hàng thành công | Tea & Coffee</title>
</head>
<body>
<div layout:fragment="content">
    <section class="container my-5 py-5 text-center">
        <div class="card shadow-sm p-5 border-0 rounded-4">
            <div class="mb-4">
                <i class="fas fa-check-circle text-success" style="font-size: 5rem;"></i>
            </div>
            <h1 class="fw-bold text-success">Đặt hàng thành công!</h1>
            <p class="lead mt-3">Cảm ơn bạn đã tin tưởng và sử dụng dịch vụ của <strong>Tea & Coffee</strong>.</p>
            
            <div class="order-info bg-light p-4 rounded-4 my-4 mx-auto" style="max-width: 500px;">
                <p class="mb-2">Mã đơn hàng: <strong class="text-success" th:text="'#' + ${order.id}">#12345</strong></p>
                <p class="mb-2">Tổng thanh toán: <strong class="text-danger" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'POINT', 0, 'COMMA') + ' đ'}"></strong></p>
                <p class="mb-0">Phương thức: <strong th:text="${order.paymentMethod == 'COD' ? 'Tiền mặt' : (order.paymentMethod == 'MOMO' ? 'Ví MoMo' : 'Chuyển khoản ngân hàng')}"></strong></p>
            </div>

            <p class="text-muted mb-5">Chúng tôi sẽ sớm liên hệ với bạn để xác nhận đơn hàng.</p>
            
            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                <a th:href="@{/}" class="btn btn-success btn-lg px-5 rounded-pill fw-bold">TIẾP TỤC MUA SẮM</a>
                <a th:href="@{/user/orders}" class="btn btn-outline-success btn-lg px-5 rounded-pill fw-bold">XEM ĐƠN HÀNG</a>
            </div>
        </div>
    </section>
</div>
</body>
</html>
