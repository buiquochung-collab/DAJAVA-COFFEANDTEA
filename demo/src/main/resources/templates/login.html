<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main}">
<head>
    <title>Đăng nhập | Tea & Coffee</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <h2 class="fw-bold text-success">ĐĂNG NHẬP</h2>
                            <p class="text-muted small">Chào mừng bạn quay trở lại với Tea & Coffee!</p>
                        </div>

                        <div th:if="${param.error}" class="alert alert-danger rounded-pill py-2 small text-center">
                            Sai tên đăng nhập/email hoặc mật khẩu.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-info rounded-pill py-2 small text-center">
                            Đã đăng xuất thành công.
                        </div>
                        <div th:if="${successMessage}" class="alert alert-success rounded-pill py-2 small text-center" th:text="${successMessage}"></div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label small fw-bold">Tên đăng nhập hoặc Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 rounded-start-pill border-success-subtle"><i class="fas fa-user text-success opacity-50"></i></span>
                                    <input type="text" class="form-control border-start-0 rounded-end-pill border-success-subtle p-3 shadow-none" id="username" name="username" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label small fw-bold">Mật khẩu</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0 rounded-start-pill border-success-subtle"><i class="fas fa-lock text-success opacity-50"></i></span>
                                    <input type="password" class="form-control border-start-0 rounded-end-pill border-success-subtle p-3 shadow-none" id="password" name="password" required>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                                    <label class="form-check-label small text-muted" for="remember-me">Ghi nhớ</label>
                                </div>
                                <a th:href="@{/auth/forgot-password}" class="text-success text-decoration-none small fw-bold">Quên mật khẩu?</a>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success rounded-pill py-3 fw-bold shadow-sm">ĐĂNG NHẬP</button>
                            </div>
                            
                            <div class="divider d-flex align-items-center my-4">
                                <hr class="flex-grow-1"><span class="mx-3 text-muted small fw-bold">HOẶC</span><hr class="flex-grow-1">
                            </div>

                            <div class="d-grid gap-2">
                                <a th:href="@{/oauth2/authorization/google}" class="btn btn-outline-danger rounded-pill py-2 fw-bold small">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="18" class="me-2"> Đăng nhập với Google
                                </a>
                            </div>
                            <div class="text-center mt-4">
                                <p class="mb-0 small">Bạn chưa có tài khoản? <a th:href="@{/register}" class="text-success text-decoration-none fw-bold">Đăng ký thành viên</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
